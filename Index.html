<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Soda Stereo - Discografía Interactiva</title>
<style>
body{margin:0;background:#000000;color:oklab(83.7% -0.04638 0.01768);font-family:Arial}
header{text-align:center;padding:20px;background:#000000}
.logo{display:block;margin:20px auto;max-width:220px;border-radius:50%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;padding:20px}
.card{background:#1b1b1b;border-radius:10px;padding:10px;cursor:pointer;text-align:center}
.card img{width:100%;height:200px;object-fit:cover}
.player{display:flex;gap:20px;padding:20px;background:#111;flex-wrap:wrap}
.songsLyrics{
display:flex;
gap:20px;
align-items:flex-start;
}

.songsPanel{
width:35%;
}

#lyricsBox{
width:65%;
background:#111;
border-radius:10px;
padding:15px;
max-height:500px;
overflow-y:auto;
}

#songs{
margin:0;
padding-left:20px;
}
#cover{width:260px;height:260px;border-radius:50%;object-fit:cover}
.spin{animation:spin 6s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
#songs li{padding:6px;cursor:pointer}
.controls button{padding:8px;margin:3px}
audio{width:100%}
#lyricsBox h3{color:#ff0000;margin-top:0}

#lyrics{white-space:pre-wrap;line-height:1.8;font-size:20px;color:yellow}
</style>
</head>
<body>
<header><h2>Soda Stereo</h2>
    <p>Discografía interactiva</p>
    <p> By Pablo Gagliano</p>
    <br>
<img src="img/SS.gif" class="logo" alt="Logo SS">
</header>
<div id="albums" class="grid"></div>
<div class="player">
<div><img id="cover" src="img/gulp.jpg"></div>
<div style="flex:1">
<h2 id="albumTitle">Seleccione un disco</h2>

<div class="songsLyrics">

<div class="songsPanel">
<ul id="songs"></ul>
</div>

<div id="lyricsBox">
<h3>Letra</h3>
<pre id="lyrics">Seleccione una canción</pre>
</div>

</div>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="playSong()">▶</button>
<button onclick="pauseSong()">⏸</button>
<button onclick="nextSong()">⏭</button>
</div>
<br>
<audio id="audio" controls></audio>
</div>

</div>

<script>
const audio = document.getElementById("audio");
const cover = document.getElementById("cover");

const discos={
"Soda Stereo (1984)":{img:"img/Soda Stereo.jpg",folder:"Soda Stereo",songs:["Afrodisiacos","Dietetico","El tiempo es dinero","Mi novia tiene biceps"]},
"Oktubre (1986)":{img:"img/oktubre.jpg",folder:"Oktubre",songs:["Fuegos de octubre","Preso en mi ciudad"]}

};
const letras={
"Afrodisiacos": `
Desperté
Desperté
Con los pies helados
Donde estas?
Que paso anoche?
No recuerdo bien...`,

};

let currentAlbum=null,currentSong=0;
const albums=document.getElementById("albums");
for(let n in discos){albums.innerHTML+=`<div class='card' onclick="openAlbum('${n}')"><img src='${discos[n].img}'><h3>${n}</h3></div>`}


function openAlbum(n){
currentAlbum=n;
currentSong=0;

document.getElementById('albumTitle').innerText=n;
document.getElementById('cover').src=discos[n].img;

let ul=document.getElementById('songs');
ul.innerHTML='';

discos[n].songs.forEach((s,i)=>{
let li=document.createElement('li');
li.textContent=(i+1)+'. '+s;
li.onclick=()=>loadSong(i);
ul.appendChild(li);
});

if(discos[n].songs.length>0){
loadSong(0);
}

document.querySelector('.player').scrollIntoView({
    behavior:'smooth'
});
}



function loadSong(i){
    currentSong = i;

    let d = discos[currentAlbum];
    let num = String(i+1).padStart(2,'0');

    audio.pause();              // opcional pero recomendado
   audio.src = `mp3/${d.folder}/${d.songs[i]}.mp3`;

    audio.load();               // fuerza reinicio del audio
    audio.currentTime = 0;      // empieza desde 0

    audio.play();

    cover.classList.add('spin');

    document.getElementById('lyrics').textContent =
        letras[d.songs[i]] || 'Letra no disponible';
}
function pauseSong(){audio.pause();cover.classList.remove('spin');}
function playSong(){
audio.play();
cover.classList.add('spin');
}

function nextSong(){if(currentAlbum){let d=discos[currentAlbum];loadSong((currentSong+1)%d.songs.length);}}
function prevSong(){if(currentAlbum){let d=discos[currentAlbum];loadSong((currentSong-1+d.songs.length)%d.songs.length);}}
audio.addEventListener('ended',nextSong);
</script>
</body></html>
